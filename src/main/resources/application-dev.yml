spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/loagun_dev?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: loagun
    password: loagun1234
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

lostark:
  api:
    base-url: https://developer-lostark.game.onstove.com
    key: ${LOSTARK_API_KEY:your-dev-api-key}

logging:
  level:
    com.loagun: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
